name: Build wheels

# Triggers:
#   - tag push `v*`         -> full matrix + publish job runs
#   - manual dispatch       -> full matrix, no publish
#   - PR touching build bits-> full matrix on PR runner, no publish (guards against
#                              breaking the build with a pyproject/setup/kernel edit)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/wheels.yml"
      - "pyproject.toml"
      - "setup.py"
      - "MANIFEST.in"
      - "src/snn_opt/_native/**"

jobs:
  build_wheels:
    name: Wheels (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    arch: x86_64 }
          - { os: ubuntu-24.04-arm, arch: aarch64 }
          - { os: macos-14,         arch: arm64 }
          - { os: windows-latest,   arch: AMD64 }
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v2.21
        env:
          # CPython 3.9 through 3.13. Bump as new minor versions land.
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          # Skip musl (Alpine) and PyPy to keep the matrix small.
          CIBW_SKIP: "*-musllinux* pp*"
          CIBW_ARCHS: ${{ matrix.arch }}
          # scipy >=1.13 dropped manylinux2014 wheels; pin to manylinux_2_28
          # so the post-build test container can pip-install scipy as a
          # binary wheel instead of falling back to a from-sdist build.
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          # Smoke-test every built wheel by importing + running the test suite.
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "pytest {project}/tests -q"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build source distribution
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Only on tag push. Trusted publishing (OIDC) requires the
    # `pypi` environment to be configured on PyPI side; until then this
    # job will fail benignly and the artifacts can be uploaded manually.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/snn_opt
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
